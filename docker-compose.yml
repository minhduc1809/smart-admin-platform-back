version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_backend_dev
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@database:5432/saas_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - saas_network

  database:
    image: postgres:15-alpine
    container_name: saas_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres123}
      POSTGRES_DB: ${DB_NAME:-saas_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    container_name: saas_redis_dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: saas_pgadmin_dev
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - saas_network
    depends_on:
      database:
        condition: service_healthy

volumes:
  backend_uploads:
  postgres_data:
  redis_data:

networks:
  saas_network:
    driver: bridge
